<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmex</title>
    <link rel="stylesheet" href="formulario.css">
    <link rel="icon" type="image/svg+xml" href="favicon/icon.svg">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <img src="assets/filmex_logo.svg" alt="logo">
        </div>

        <nav class="d-flex align-items-center gap-2">
            <ul class="nav__links">
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="peliculas.html">Películas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="sobre_mi.html">Sobre mi</a></li>
            </ul>

            <ul class="nav__cesde">
                <li><a href="formulario.html" class="selected">Formulario</a></li>
                <li><a href="base_datos.html">Base de Datos</a></li>
                <li><a href="logica.html">Lógica</a></li>
            </ul>
        </nav>

        <div class="search">
            <input type="text" class="search__input" placeholder="Buscar...">
            <button class="search__btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
            </button>
        </div>
    </header>

    <!--Crud-->
    <section class="crud">
        <h2 class="crud__titulo">Gestión de Clientes</h2>

        <form class="crud__form">

            <div class="crud__grid">

                <div class="crud__campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: María García">
                </div>

                <div class="crud__campo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="Ej: maria@correo.com">
                </div>

                <div class="crud__campo">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ej: 3001234567">
                </div>

                <div class="crud__campo">
                    <label for="nacimiento">Fecha de nacimiento</label>
                    <input type="date" id="nacimiento" name="nacimiento">
                </div>

                <div class="crud__campo">
                    <label for="genero">Género</label>
                    <select id="genero" name="genero">
                        <option value="" disabled selected>Seleccionar...</option>
                        <option value="M">Masculino</option>
                        <option value="F">Femenino</option>
                        <option value="O">Otro</option>
                    </select>
                </div>

            </div>

            <div class="crud__botones">
                <button type="submit">Crear</button>
                <button type="button">Consultar</button>
                <button type="button">Actualizar</button>
                <button type="button">Eliminar</button>
            </div>

        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer__top">

            <div class="footer__left">
                <div class="footer__logo">
                    <img src="assets/filmex_logo.svg" alt="logo">
                </div>
                <a href="#">Información legal</a>
                <a href="#">Contáctenos para PQRS</a>
                <a href="#">Preguntas frecuentes</a>
                <div class="footer__redes">
                    <a href="https://www.facebook.com"><img src="img/facebook.png" alt="facebook"></a>
                    <a href="https://www.instagram.com"><img src="img/instagram.png" alt="instagram"></a>
                    <a href="mailto:jzapata12345@cesde.net"><img src="img/email.png" alt="email"></a>
                </div>
            </div>

            <div class="footer__contacto">
                <h2>Contacto</h2>
                <p>📧 jzapata12345@cesde.net</p>
                <p>📞 +57 304 202 0579</p>
            </div>

            <div class="footer__right">
                <h2>Suscríbete y se un Film-Fans</h2>
                <form action="">
                    <label for="lcorreo">Conoce los descuentos que tenemos para ti.</label>
                    <div class="footer__row">
                        <input type="email" name="correo" id="lcorreo" placeholder="Escribe tu correo...">
                        <button type="submit">Suscribirse</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="footer__center">
            <p>Derechos reservados © 2026 Filmex</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
